services:
  # 1. NestJS Backend Web Service
  - type: web
    name: matchflow-backend
    env: docker
    dockerContext: .
    dockerfilePath: apps/backend/Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: PORT
        value: 3010
      - key: NODE_ENV
        value: production
      - key: SERVICE_NAME
        value: matchflow-arena-api
      # Auto-link postgres connection string
      - key: DATABASE_URL
        fromDatabase:
          name: matchflow-postgres
          property: connectionString
      # Auto-link Redis connection details
      - key: REDIS_HOST
        fromRedis:
          name: matchflow-redis
          property: host
      - key: REDIS_PORT
        fromRedis:
          name: matchflow-redis
          property: port
      # Secure auto-generated JWT secrets (Render will generate strong values)
      - key: JWT_ACCESS_TOKEN_SECRET
        generateValue: true
      - key: JWT_REFRESH_TOKEN_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRY
        value: 15m
      - key: JWT_REFRESH_TOKEN_EXPIRY
        value: 7d
      # Auto-link Frontend URL for CORS and Links
      - key: CORS_ORIGINS
        fromService:
          name: matchflow-frontend
          type: web
          property: host
      - key: FE_APP_URL
        fromService:
          name: matchflow-frontend
          type: web
          property: host
      # Production Configuration defaults
      - key: NOTIFICATION_PROVIDER
        value: noop
      - key: NOTIFICATION_PROCESS_LIMIT
        value: 20
      - key: PAYMENT_PROVIDER
        value: manual
      - key: PAYMENT_DEFAULT_CURRENCY
        value: INR
      - key: RATE_LIMIT_TTL_SECONDS
        value: 60
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 120
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: 20
      - key: PAYMENT_RATE_LIMIT_MAX_REQUESTS
        value: 30
      - key: EXPORT_RATE_LIMIT_MAX_REQUESTS
        value: 20

  # 2. Next.js Frontend Web Service (Node/Docker base for standalone Next.js)
  - type: web
    name: matchflow-frontend
    env: docker
    dockerContext: .
    dockerfilePath: apps/frontend/Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: NEXT_PUBLIC_APP_NAME
        value: MatchFlow Arena
      # Automatically pass backend API URL to build-time Next.js environment
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: matchflow-backend
          type: web
          property: host

databases:
  # 3. Production PostgreSQL Database
  - name: matchflow-postgres
    databaseName: matchflow_arena
    user: matchflow
    plan: starter
    region: oregon
    postgresMajorVersion: 16

redis:
  # 4. Production Redis Instance
  - name: matchflow-redis
    plan: starter
    region: oregon
    ipRangePolicy: private
